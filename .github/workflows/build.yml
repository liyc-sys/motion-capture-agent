name: build-windows
on: [push, workflow_dispatch]
jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install playwright pyinstaller requests
        shell: bash
      - run: playwright install chromium
        shell: bash
      - run: pyinstaller --name MotionCapture --onedir --collect-all playwright --collect-all requests --hidden-import asyncio capture_browser.py
        shell: bash
      - run: cp README.txt dist/MotionCapture/ ; ls dist/MotionCapture
        shell: bash
      - name: zip
        run: Compress-Archive -Path dist/MotionCapture -DestinationPath MotionCapture-Windows.zip
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: MotionCapture-Windows-zip
          path: MotionCapture-Windows.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: MotionCapture-Windows.zip
          tag_name: v${{ github.run_number }}
          name: Windows Build ${{ github.run_number }}
